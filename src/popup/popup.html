<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 12px; font-family: sans-serif; }
    textarea { width: 100%; height: 120px; font-size: 12px; }
    button { margin-top: 8px; padding: 6px 12px; cursor: pointer; }
    .hint { font-size: 11px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>Prompt Rules (JSON)</h3>
  <textarea id="rules-input" placeholder='[{"pattern": "verbose phrase", "replacement": "short"}]'></textarea>
  <button id="save">Save Rules</button>
  <p class="hint">Press Ctrl+Shift+O on Claude.ai to optimize your prompt</p>
  <script src="popup.js"></script>
</body>
</html>
